name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # change if your default branch is 'master' or something else

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-uploaded: ${{ steps.upload-artifact.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build

      - name: Upload Pages artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          path: 'dist'    # ensure build outputs to dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v3