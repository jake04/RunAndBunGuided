name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # change if your default branch is 'master' or something else

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-uploaded: ${{ steps.upload-artifact.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: node build

      - name: Verify index.html exists
        run: |
          if [ -f dist/index.html ]; then
            echo "✓ dist/index.html found"
            ls -la dist/ | head -20
          else
            echo "✗ dist/index.html NOT found"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        id: upload-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3